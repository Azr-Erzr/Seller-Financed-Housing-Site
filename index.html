<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LandMatch — Seller-financed residential and commercial real estate. Connect buyers and sellers directly. No banks, no agents." />
    <title>LandMatch — Seller-Financed Real Estate</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
      integrity="sha512-Zcn6bjR/8RZbLEpLIeOwNtzREBAJnUKESxces60Mpoj+2okopSAcSUIUOseddDm0cxnGQzxIR7vJgsLZbdLE3Q=="
      crossorigin="anonymous"
    />
    <!-- Leaflet Draw CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
      crossorigin="anonymous"
    />
    <!--
      CRITICAL: Tailwind Preflight override for Leaflet.
      This MUST live in index.html, not in a CSS file processed by Vite/PostCSS.
      Vite's build pipeline can reorder rules inside compiled bundles, which is
      why putting this in index.css failed repeatedly. Inline in the HTML, it loads
      synchronously after Leaflet CSS but before any Vite bundle, and is immune
      to build tool processing.
    -->
    <style>
      .leaflet-container img,
      .leaflet-tile-pane img,
      .leaflet-container .leaflet-tile {
        max-width: none !important;
        max-height: none !important;
      }
      .leaflet-container .leaflet-tile-pane .leaflet-tile {
        width: 256px !important;
        height: 256px !important;
      }
      .leaflet-container a { color: inherit; text-decoration: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
